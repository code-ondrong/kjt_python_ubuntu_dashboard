# Alternate approach: agetty autologin drop-in
#
# If you prefer a simpler setup where the dashboard runs after
# automatic login on tty1 (rather than replacing getty entirely),
# place this file at:
#
#   /etc/systemd/system/getty@tty1.service.d/override.conf
#
# Then run:
#   sudo systemctl daemon-reload
#   sudo systemctl restart getty@tty1
#
# The dashboard user will be logged in automatically and you can
# add `python3 /opt/system-monitor/main.py` to that user's
# .bashrc or .profile.

[Service]
ExecStart=
ExecStart=-/sbin/agetty --autologin dashboard --noclear %I $TERM
